<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Snake</title><script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script><link rel="reset" href="reset.css"><link rel="stylesheet" href="styles.css"></head><body><div id="game-root"><p id="score">Score: 0</p><canvas id="board" width="400" height="400" aria-label="Snake game board"></canvas></div><div id="ui-root"></div><template id="welcome-screen"><div class="start-prompt base"><p>Start the game?</p><button type="button" id="btn-start-game" class="btn-green">Yes, start</button> <button type="button" id="btn-cancel-game" class="btn-red">No, thanks</button> <button type="button" id="btn-help-game" class="btn-white">How to play</button></div></template><template id="help-game"><div class="help-prompt base"><h3>How to Play</h3><ul><li>Use <strong>Arrow keys</strong> to move the snake</li><li>Eat red squares to grow and score points</li><li>Avoid hitting walls and yourself</li><li>After game over, press <strong>Backspace</strong> to return to start</li><li>Then click Yes → watch ad → play again</li></ul><button type="button" id="btn-back-from-help" class="btn-white">Back</button></div></template><template id="pre-game"><div class="pre-game"><p class="ad-label">Advertisement</p><div id="ad-container"><video id="ad-video" playsinline></video></div><p id="ad-status">Loading ad…</p></div></template><script defer="defer" src="bundle.js"></script></body></html>
