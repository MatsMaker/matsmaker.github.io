<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Snake</title>
  <!-- Google Ad Manager web tag: https://developers.google.com/publisher-tag/guides/get-started -->
  <script>
    window.googletag = window.googletag || {};
    googletag.cmd = googletag.cmd || [];
  </script>
  <script async src="https://securepubads.g.doubleclick.net/tag/js/gpt.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="welcome-screen" class="start-prompt">
    <p>Start the game?</p>
    <button type="button" id="btn-start-game">Yes, start</button>
    <button type="button" id="btn-cancel-game">No, thanks</button>
  </div>
  <div id="pre-game" class="pre-game">
    <p class="ad-label">Advertisement</p>
    <div id="div-gpt-ad-snake-prestart"></div>
    <p id="ad-status">Loading ad…</p>
  </div>
  <div id="game-root">
    <p id="score">Score: 0</p>
    <canvas id="board" width="400" height="400" aria-label="Snake game board"></canvas>
    <p>Arrow keys to move · Eat squares · Avoid walls and yourself · After game over, Backspace returns to start (then Yes → ad → play)</p>
  </div>
  <script src="model.js"></script>
  <script src="view.js"></script>
  <script src="controller.js"></script>
  <script src="game.js"></script>
  <script src="main.js"></script>
  <script src="ads.js"></script>
</body>
</html>
