<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Snake</title>
  <!-- Google IMA SDK for video ads: https://developers.google.com/interactive-media-ads -->
  <script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="welcome-screen" class="start-prompt">
    <p>Start the game?</p>
    <button type="button" id="btn-start-game">Yes, start</button>
    <button type="button" id="btn-cancel-game">No, thanks</button>
  </div>
  <div id="pre-game" class="pre-game">
    <p class="ad-label">Advertisement</p>
    <div id="ad-container">
      <video id="ad-video" playsinline></video>
    </div>
    <p id="ad-status">Loading ad…</p>
  </div>
  <div id="game-root">
    <p id="score">Score: 0</p>
    <canvas id="board" width="400" height="400" aria-label="Snake game board"></canvas>
    <p>Arrow keys to move · Eat squares · Avoid walls and yourself · After game over, Backspace returns to start (then Yes → ad → play)</p>
  </div>
  <script src="model.js"></script>
  <script src="view.js"></script>
  <script src="controller.js"></script>
  <script src="game.js"></script>
  <script src="main.js"></script>
  <script src="ads.js"></script>
</body>
</html>
