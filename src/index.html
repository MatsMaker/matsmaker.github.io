<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="application-name" content="Snake Game">
  <!-- TV browser compatibility -->
  <meta name="tizen-app-launch-mode" content="standalone">
  <meta name="webos-app-keyboardtype" content="remote">
  <title>Snake</title>
  <!-- Google IMA SDK for video ads: https://developers.google.com/interactive-media-ads -->
  <script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>
  <!-- LG webOS key registration -->
  <script>
    (function() {
      // Register LG webOS keys for remote control support
      if (window.webOSDev && window.webOSDev.keyboardHook) {
        ['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Left', 'Right', 'Up', 'Down', 'Back', 'Enter', 'ColorF0Red', 'ColorF1Green', 'ColorF2Yellow', 'ColorF3Blue'].forEach(function(key) {
          try { window.webOSDev.keyboardHook.registerKey(key); } catch(e) {}
        });
      }
      
      if (window.PalmSystem) {
        try { window.PalmSystem.keyMask = 0xFFFFFFFF; } catch(e) {}
      }
    })();
  </script>
  <link rel="reset" href="reset.css">
</head>
<body tabindex="0" style="outline: none;">

  <div id="game-root">
    <p id="score">Score: 0</p>
    <canvas id="board" width="400" height="400" aria-label="Snake game board"></canvas>
  </div>
  <div id="ui-root"></div>

  <template id="template-welcome-screen">
    <div class="start-prompt base">
      <p>Start the game?</p>
      <button type="button" id="btn-start-game" class="btn-green">Yes, start</button>
      <button type="button" id="btn-cancel-game" class="btn-red">No, thanks</button>
      <button type="button" id="btn-help-game" class="btn-white">How to play</button>
    </div>
  </template>
  <template id="template-help-game">
    <div class="help-prompt base">
      <h3>How to Play</h3>
      <ul>
        <li>Use <strong>Arrow keys</strong> to move the snake</li>
        <li>Eat red squares to grow and score points</li>
        <li>Avoid hitting walls and yourself</li>
        <li>After game over, press <strong>Backspace</strong> to return to start</li>
        <li>Then click Yes → watch ad → play again</li>
      </ul>
      <button type="button" id="btn-back-from-help" class="btn-white">Back</button>
    </div>
  </template>
  <template id="template-pre-game">
    <div class="pre-game">
      <p class="ad-label">Advertisement</p>
      <div id="ad-container">
        <video id="ad-video" playsinline></video>
      </div>
      <p id="ad-status">Loading ad…</p>
    </div>
  </template>

</body>
</html>
