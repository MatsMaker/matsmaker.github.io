<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="application-name" content="Snake Game">
  <!-- TV browser compatibility -->
  <meta name="tizen-app-launch-mode" content="standalone">
  <meta name="webos-app-keyboardtype" content="remote">
  <title>Snake</title>
  <!-- Google IMA SDK for video ads: https://developers.google.com/interactive-media-ads -->
  <script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>
  <!-- LG webOS key registration -->
  <script>
    (function() {
      // Register LG webOS keys for remote control support
      if (window.webOSDev && window.webOSDev.keyboardHook) {
        ['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Left', 'Right', 'Up', 'Down', 'Back', 'Enter', 'ColorF0Red', 'ColorF1Green', 'ColorF2Yellow', 'ColorF3Blue'].forEach(function(key) {
          try { window.webOSDev.keyboardHook.registerKey(key); } catch(e) {}
        });
      }
      
      if (window.PalmSystem) {
        try { window.PalmSystem.keyMask = 0xFFFFFFFF; } catch(e) {}
      }
    })();
  </script>
  <link rel="reset" href="reset.css">
</head>
<body tabindex="0" style="outline: none;">

  <div id="game-root">
    <p id="score">Score: 0</p>
    <canvas id="board" width="400" height="400" aria-label="Snake game board"></canvas>
  </div>
  <div id="ui-root"></div>

</body>
</html>
